name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        env:
          PUBLIC_SUPABASE_URL: https://spbktibuuxhrrzdjbqjs.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwYmt0aWJ1dXhocnJ6ZGpicWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTQyNjQsImV4cCI6MjA5MDM3MDI2NH0.NV1V93gFWupsNLltUu10L6w4UJ1RGrAP5Wd1S9blFIE
          PUBLIC_WHATSAPP_URL: https://wa.me/59177423154?text=Hola%20Potrero,%20me%20interesa%20saber%20m%C3%A1s
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
